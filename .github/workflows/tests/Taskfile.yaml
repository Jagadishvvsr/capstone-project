version: "3"


env:
  GITHUB_TOKEN:
    sh: gh auth token

tasks:
  trigger-workflow:
    desc: Trigger Github Actions workflow using act 
    cmds: 
     - |
       act pull_request --container-architecture linux/amd64 -P ubuntu-24.04=catthehacker/ubuntu:act-22.04 -e {{ .PWD }}/event-payload.json -s GITHUB_TOKEN="{{ .GITHUB_TOKEN }}" --directory ../../.. -W .github/workflows/test.yaml