name: Build and push the container images

on:
    push:
        branches:
            - main
        paths:
            - services/**
        tags:
            - "**@[0-9]*.[0-9]*.[0-9]*"

    workflow_dispatch:
        inputs:
           services:
            description: Services to build
            required: true
            type: choice
            options:    
                - services/node/api-node
                - services/go/api-golang
                - services/react/client-react
                - services/python/load-generator-python
                - services/other/api-golang-migrator
           version: 
             description: version to tag the image
             required: false

jobs:
    filter:
      runs-on: ubuntu-24.04
      outputs:
          services: ${{ steps.setup-matrix.outputs.services }}
          environment: ${{ steps.setup-matrix.outputs.environment}}

      steps:
         - name: checkout the code
           uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
         
         - name: filter
           id: filter
           uses: dorny/paths-filter@v4
           with:
            token: ${{ secrets.GITHUB_TOKEN }}
            filters: .github/utils/file-filters.yml

         - name: setup-matrix
           id: setup-matrix
           run: |
            if [[ "${{ github.event_name}}" == "workflow_dispatch" ]]; then

                echo 'services=["${{ inputs.services }}"]'  >> "$GITHUB_OUTPUT"
                echo 'environment=development' >> "$GITHUB_OUTPUT"


            elif [[ "${{ github.ref_type}}" == "tag" ]]; then
                tag="${GITHUB_REF_NAME}"
                svc="${tag%%@*}"
                echo "services=[\"$svc\"]" >> GITHUB_OUTPUT
                echo "environment=production" >> GITHUB_OUTPUT
           
            else
                echo "services=${{ steps.filter.outputs.changes}}" >> GITHUB_OUTPUT
                echo "environment=staging" >> GITHUB_OUTPUT
            fi

         - name: echo services
           run: |
            echo ${{ steps.setup-matrix.outputs.services }}
            echo ${{ steps.setup-matrix.outputs.environment }}



    build-push-container-image:
        if: ${{ needs.filter.outputs.services != '[]' && needs.filter.outputs.services != ' ' }}
        strategy:
          fail-fast: false
          matrix:
              services: ${{ fromJson(needs.filter.outputs.services) }}
        needs: filter    
        runs-on: ubuntu-24.04
        steps:
           - name: checkout the code
             uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
             with:
                fetch-depth: 0
           
           - name: Install Task
             uses: ./.github/actions/setup-dependencies
             with:
              install-task: 'true'

           - name: Login to Dockerhub
             if: ${{ !env.ACT }}
             uses: docker/login-action@v4
             with: 
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
          #  - name: Version tags
          #    uses: docker/setup-qemu-action@v4
           
          #  - name: Set up Docker Buildx
          #    uses: docker/setup-buildx-action@v4
           
           - name: commute Image tag
             id: image-tag
             working-directory: "${{ matrix.services }}"
             env:
              ENVIRONMENT: ${{ needs.filter.outputs.environment }}
              SERVICE: "${{ matrix.services }}"
             run: |
                
                if [[ $ENVIRONMENT == "production" ]]; then
                    version=$(task utils:generate-version -- "$SERVICE")
                    image_tag=$(task utils:generate-version-tag -- "$SERVICE")
                else   
                    version=$(task utils:generate-extended-version -- "$SERVICE")
                    image_tag=$(task utils:generate-extended-version-tag -- "$SERVICE")
                fi 

                echo "version=$version" >> "$GITHUB_OUTPUT"
                echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
                ## TODO: generate the actual version/tag

                echo "version=$version" 
                echo "image_tag=$image_tag"
                  
            
           - name: Build and push
             uses: docker/build-push-action@v7
             with: 
                push:  ${{ !env.ACT }}
                tags: ${{ steps.image-tag.outputs.image_tag }}
                context: ${{ matrix.services }}
                platforms: linux/amd64
                cache-from: type=gha
                cache-to: type=gha
