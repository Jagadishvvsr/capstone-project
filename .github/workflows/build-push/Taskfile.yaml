version: "3"


env:
  GITHUB_TOKEN:
    sh: gh auth token

tasks:
  trigger-docker-buld-and-push:
    desc: Trigger Github Actions workflow using act 
    cmds: 
     - |
       act workflow_dispatch --container-architecture linux/amd64 -P ubuntu-24.04=catthehacker/ubuntu:act-22.04 -e {{ .PWD }}/event-payload.json -s GITHUB_TOKEN="{{ .GITHUB_TOKEN }}" --directory ../../.. -W .github/workflows/build-push.yaml

  trigger-workflow-tag:
    desc: Trigger Github Actions workflow using act 
    cmds: 
     - |
       act push --container-architecture linux/amd64 -P ubuntu-24.04=catthehacker/ubuntu:act-22.04 -e {{ .PWD }}/push-tag-event.json -s GITHUB_TOKEN="{{ .GITHUB_TOKEN }}" --directory ../../.. --no-skip-checkout -W .github/workflows/build-push.yaml